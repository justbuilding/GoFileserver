apiVersion: v1
kind: PersistentVolume
metadata:
  name: gofileserver-pv
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/gofileserver"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gofileserver-pvc
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      type: local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gofileserver
  namespace: default
  labels:
    app: gofileserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gofileserver
  template:
    metadata:
      labels:
        app: gofileserver
    spec:
      containers:
      - name: gofileserver
        image: registry.cn-hangzhou.aliyuncs.com/public_hjj_images/go-fileserver:latest
        ports:
        - containerPort: 8080
        env:
        - name: AUTH_USER
          value: "admin"
        - name: AUTH_PASS
          value: "password123"
        volumeMounts:
        - name: www-volume
          mountPath: /web/www
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "128Mi"
      volumes:
      - name: www-volume
        persistentVolumeClaim:
          claimName: gofileserver-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gofileserver
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: gofileserver
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gofileserver-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
  - host: fileserver.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gofileserver
            port:
              number: 8080