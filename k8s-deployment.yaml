apiVersion: apps/v1
kind: Deployment
metadata:
  name: gofileserver
  namespace: default
  labels:
    app: gofileserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gofileserver
  template:
    metadata:
      labels:
        app: gofileserver
    spec:
      containers:
      - name: gofileserver
        image: registry.cn-hangzhou.aliyuncs.com/public_hjj_images/go-fileserver:latest
        ports:
        - containerPort: 8080
        env:
        - name: AUTH_USER
          value: "admin"
        - name: AUTH_PASS
          value: "password123"
        volumeMounts:
        - name: www-volume
          mountPath: /web/www
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "128Mi"
      volumes:
      - name: www-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gofileserver
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
  selector:
    app: gofileserver